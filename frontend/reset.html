<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate">
  <title>Atherloom 正在更新</title>
  <style>
    body{margin:0;min-height:100dvh;display:grid;place-items:center;background:#f7f6f2;color:#2b2a27;font:15px/1.7 -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;text-align:center}
    main{padding:28px}.mark{color:#c96442;font-size:34px}p{color:#77736b}
  </style>
</head>
<body>
  <main><div class="mark">✦</div><strong>正在清除旧版本并更新 Atherloom…</strong><p id="status">请不要关闭这个页面。</p></main>
  <script>
    (async () => {
      try {
        const registrations = await navigator.serviceWorker?.getRegistrations?.() || [];
        await Promise.all(registrations.map(registration => registration.unregister()));
        const keys = await caches?.keys?.() || [];
        await Promise.all(keys.filter(key => key.startsWith('atherloom-')).map(key => caches.delete(key)));
        sessionStorage.clear();
        location.replace('./?fresh=reset-v15-' + Date.now());
      } catch (error) {
        document.querySelector('#status').textContent = '自动更新失败，请关闭 Safari 后重新打开此页。';
      }
    })();
  </script>
</body>
</html>
