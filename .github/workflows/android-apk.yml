name: Build Android APK

on:
  push:
    branches: [main]
    tags: ["v*"]
    paths: ["android/**", "frontend/**", ".github/workflows/android-apk.yml"]
  workflow_dispatch:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: android
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.10.2"
      - name: Compile APK
        shell: bash
        run: |
          set +e
          gradle :app:assembleDebug --stacktrace 2>&1 | tee build.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            message=$(grep -Ei 'error:|failure:|what went wrong|execution failed|could not|caused by|exception is' build.log | head -n 80 | tr '\n' ' ' | sed 's/%/%25/g; s/\r/%0D/g')
            echo "::error title=Android compiler::$message"
          fi
          exit "$status"
      - uses: actions/upload-artifact@v4
        with:
          name: Atherloom-Standalone-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
      - name: Publish installable APK
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk Atherloom-Android.apk
          gh release create "$GITHUB_REF_NAME" Atherloom-Android.apk --title "Atherloom $GITHUB_REF_NAME" --notes "Atherloom · 心织域 Android 独立测试版。下载 APK 后即可安装，首次打开请添加自己的 API 与网关线路。"
